name: OLX Bot

on:
  schedule:
    - cron: "* * * * *"   # co minutę
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot.py
